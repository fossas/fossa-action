name: 'FOSSA Action'

on: push

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v7

      - name: Use Node.js 24.x
        uses: actions/setup-node@v6
        with:
          node-version: 24.x

      - name: Install npm packages
        run: corepack enable && yarn --immutable

      - name: Run lint
        run: yarn lint

  fossa-scan:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v7

      - name: Use Node.js 24.x
        uses: actions/setup-node@v6
        with:
          node-version: 24.x

      - name: Install npm packages
        run: corepack enable && yarn --immutable

      - name: Build
        run: yarn build

      - name: Run FOSSA scan in debug mode and upload build data
        uses: ./
        with:
          api-key: ${{secrets.fossaApiKey}}
          debug: true

      - name: Upload FOSSA debug bundle as a build artifact
        uses: actions/upload-artifact@v7
        with:
          name: fossa.debug.json.gz
          path: ./fossa.debug.json.gz

      - name: Run FOSSA container scan and upload build data
        uses: ./
        with:
          api-key: ${{secrets.fossaApiKey}}
          container: alpine:latest

      - name: Run FOSSA scan with branch
        uses: ./
        with:
          api-key: ${{secrets.fossaApiKey}}
          branch: develop
          project: custom-test-project

      - name: Run FOSSA test with a --project and --branch
        uses: ./
        with:
          api-key: ${{secrets.fossaApiKey}}
          branch: develop
          project: custom-test-project

      - name: Run FOSSA test
        uses: ./
        with:
          api-key: ${{secrets.fossaApiKey}}
          run-tests: true

      # On the first push to a new branch, github.event.before is the zero SHA
      # (0000000000000000000000000000000000000000) because there is no previous
      # commit on that ref. In that case, fall back to diffing against the default branch.
      - name: Determine diff revision
        id: diff-rev
        env:
          BEFORE_SHA: ${{ github.event.before }}
          DEFAULT_BRANCH: ${{ github.event.repository.default_branch }}
        run: |
          if [ "$BEFORE_SHA" = "0000000000000000000000000000000000000000" ]; then
            git fetch origin "$DEFAULT_BRANCH" --depth=1
            echo "rev=$(git rev-parse "origin/$DEFAULT_BRANCH")" >> "$GITHUB_OUTPUT"
          else
            echo "rev=$BEFORE_SHA" >> "$GITHUB_OUTPUT"
          fi

      - name: Run FOSSA test with --diff
        uses: ./
        with:
          api-key: ${{secrets.fossaApiKey}}
          run-tests: true
          test-diff-revision: ${{ steps.diff-rev.outputs.rev }}

      - name: Run FOSSA test with container
        uses: ./
        with:
          api-key: ${{secrets.fossaApiKey}}
          container: alpine:latest
          run-tests: true

      - name: Generate FOSSA report
        id: example-generate-report
        uses: ./
        with:
          api-key: ${{secrets.fossaApiKey}}
          generate-report: json

      - name: Demonstrate report output
        # The report can be hundreds of KB and contains arbitrary characters
        # (quotes, parens, $, etc.) from dependency copyright text. Interpolating
        # it into the shell directly breaks quoting, and passing it via an env var
        # exceeds MAX_ARG_STRLEN ("Argument list too long"). A quoted heredoc keeps
        # the value in the script file and treats it literally, avoiding both.
        run: |
          jq <<'__FOSSA_REPORT_EOF__'
          ${{ steps.example-generate-report.outputs.report }}
          __FOSSA_REPORT_EOF__

      - name: Checkout code
        uses: actions/checkout@v7
        with:
          path: different-working-directory

      - name: Scan a different directory
        uses: ./
        with:
          api-key: ${{secrets.fossaApiKey}}
          working-directory: different-working-directory

      # The following two blocks are one test. Don't separate them.
      - name: Installs a Specific version
        uses : ./
        with:
          api-key: ${{secrets.fossaApiKey}}
          pinned-cli-version: 3.15.0

      - name: Check Version
        run:
          ./fossa/fossa --version | grep '3.15.0'

      # The following two blocks are one test. Don't separate them.
      - name: Installs a Specific version (normalized)
        uses : ./
        with:
          api-key: ${{secrets.fossaApiKey}}
          pinned-cli-version: v3.15.0

      - name: Check Version
        run:
          ./fossa/fossa --version | grep '3.15.0'

  # Dogfood the released action. The fossa-scan job above tests the working
  # copy (./); this runs the published fossas/fossa-action@v2 against this repo.
  dogfood:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v7

      - name: Run released FOSSA action (@v2) on this repo
        uses: fossas/fossa-action@v2
        with:
          api-key: ${{secrets.fossaApiKey}}
          run-tests: true
