name: Rebuild dist

on:
  push:
    branches-ignore:
      - main

concurrency:
  group: rebuild-dist-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  rebuild-dist:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 2

      - name: Check for relevant changes
        id: changes
        run: |
          if git diff --name-only HEAD~1 HEAD | grep -qE '^(package\.json|yarn\.lock|tsconfig\.json|src/)'; then
            echo "relevant=true" >> "$GITHUB_OUTPUT"
          else
            echo "relevant=false" >> "$GITHUB_OUTPUT"
          fi

      - uses: actions/setup-node@v6
        if: steps.changes.outputs.relevant == 'true'
        with:
          node-version: 20.x

      - name: Install yarn
        if: steps.changes.outputs.relevant == 'true'
        run: npm install -g yarn

      - name: Install dependencies
        if: steps.changes.outputs.relevant == 'true'
        run: yarn --frozen-lockfile

      - name: Build
        if: steps.changes.outputs.relevant == 'true'
        run: yarn build

      - name: Commit and push if dist changed
        if: steps.changes.outputs.relevant == 'true'
        run: |
          git add dist/
          if ! git diff --staged --quiet dist/; then
            git config user.name "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git commit -m "Rebuild dist"
            git push
            echo "::error::dist/ was out of date and has been rebuilt. The push will trigger a new workflow run, which will verify the fix."
            exit 1
          fi
