name: Rebuild dist

on:
  push:
    branches-ignore:
      - main
    paths:
      - 'package.json'
      - 'yarn.lock'
      - 'src/**'
      - 'tsconfig.json'

concurrency:
  group: rebuild-dist-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  rebuild-dist:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 20.x

      - name: Install yarn
        run: npm install -g yarn

      - name: Install dependencies
        run: yarn --frozen-lockfile

      - name: Build
        run: yarn build

      - name: Commit and push if dist changed
        run: |
          git add dist/
          if ! git diff --staged --quiet dist/; then
            git config user.name "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git commit -m "Rebuild dist"
            git push
            echo "::error::dist/ was out of date and has been rebuilt. The push will trigger a new workflow run, which will verify the fix."
            exit 1
          fi
