[tasks.build-dist]
description = 'Build the dist/ version of the program.'
run = '''
yarn build
'''

[tasks.lint]
description = 'Lint the project.'
run = 'yarn lint'

[tasks.lint-fix]
description = 'Lint the project while also auto-fixing things that can be.'
run = 'yarn lint --fix'

[tools]
node = "20.19.0"
"npm:eslint" = "latest"
"npm:yarn" = "latest"
